services:
  # ── Backend (FastAPI + Python 3.14) ──────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: oki-crm-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Next.js + Node 22) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: oki-crm-frontend
    env_file:
      - path: ./frontend/.env.local
        required: false
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev -- -H 0.0.0.0

  # ── Redis (cache / background jobs / websockets) ────────────────────
  # Not consumed by the app yet, but ready for when you need it.
  redis:
    image: redis:7-alpine
    container_name: oki-crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data:
