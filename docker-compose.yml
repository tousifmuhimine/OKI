services:
  # FastAPI backend for the OKI CRM API. The frontend is intentionally not
  # dockerized yet; keep running it from /frontend with npm run dev.
  backend:
    build:
      context: ./backend
    container_name: oki-crm-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis is included now for upcoming background jobs, websocket fan-out, and
  # inbox event processing. The current backend can run without consuming it.
  redis:
    image: redis:7-alpine
    container_name: oki-crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data:
